<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5efe2" />
    <meta name="description" content="墨缘——为小说读者打造的人物关系图谱应用，读完一部书，珍藏一卷人。" />
    <title>墨缘 · 人物关系图谱</title>
    <style id="boot">
      /* 在外部样式表就绪前先铺好纸色底，避免纯白屏闪烁 */
      html,
      body {
        margin: 0;
        background: #f5efe2;
        color: #1f1b16;
      }
      /* 启动页：JS 解析前即可呈现，衔接到 React 加载页 */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5efe2;
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }
      #splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        animation: splashIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes splashIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .splash-seal {
        width: 72px;
        height: 72px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        background: #a8322d;
        color: #faf6ec;
        font-family: "Noto Serif SC", Georgia, serif;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.04em;
        line-height: 1;
        border-radius: 3px;
        box-shadow: 0 0 0 1px rgba(168, 50, 45, 0.18),
          0 8px 22px -8px rgba(168, 50, 45, 0.45),
          inset 0 0 0 2px rgba(245, 239, 226, 0.18);
        transform: rotate(-3deg);
      }
      .splash-sub {
        font-size: 11px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #6b6359;
        font-family: Georgia, serif;
      }
      .splash-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #a8322d;
        animation: splashPulse 1.6s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-inner,
        #splash,
        .splash-dot {
          animation: none;
          transition: none;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Ma+Shan+Zheng&display=swap"
      rel="stylesheet"
    />
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <div class="splash-inner">
        <div class="splash-seal">墨缘</div>
        <div class="splash-sub">Ink · Bond</div>
        <div class="splash-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 启动页淡出：React 挂载后调用；并附带兜底，防止异常时永久遮挡
      window.__hideSplash = function () {
        var s = document.getElementById("splash");
        if (!s || s.dataset.hidden) return;
        s.dataset.hidden = "1";
        s.classList.add("is-hidden");
        setTimeout(function () {
          s.remove();
        }, 600);
      };
      setTimeout(function () {
        window.__hideSplash && window.__hideSplash();
      }, 8000);
    </script>
  </body>
</html>
